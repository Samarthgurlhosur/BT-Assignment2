services:
  - type: web
    name: land-registry-app
    runtime: python312
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: SECRET_KEY
        generateValue: true
databases:
  - name: land-registry-db
    databaseName: land_registry
    user: land_registry_user
    plan: free